<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Million Pixels</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4335653991954613" crossorigin="anonymous"></script>

    <style>
        body { background-color: #f0f2f5; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; color: #333; }
        
        .header-section { text-align: center; margin-bottom: 10px; }
        h1 { color: #cc0000; font-size: 38px; margin: 0; font-weight: 900; letter-spacing: -1.5px; }
        .stats { font-weight: bold; font-size: 1.1rem; margin: 10px 0; color: #555; }

        /* Zoom Toolbar */
        .toolbar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background: #ffffff;
            padding: 12px 25px;
            border-radius: 50px;
            width: fit-content;
            margin: 0 auto 20px auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }
        #zoomSlider { width: 180px; cursor: pointer; accent-color: #cc0000; }
        #zoomLabel { font-family: monospace; font-weight: bold; width: 40px; }

        .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .ad-column {
            width: 160px;
            min-width: 160px;
            height: 600px;
            background: #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #bbb;
            position: sticky;
            top: 20px;
            font-size: 12px;
            color: #999;
        }

        /* Viewport to handle the 1,000,000 pixel scroll */
        .grid-viewport {
            width: 1000px;
            height: 75vh;
            overflow: auto;
            border: 3px solid #222;
            background-color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            position: relative;
            cursor: crosshair;
        }

        #main-grid {
            width: 1000px; 
            height: 1000px; 
            position: relative; 
            transform-origin: top left;
            transition: transform 0.1s ease-out;
            /* DRAWING EVERY SINGLE PIXEL BOX */
            background-image: 
                linear-gradient(to right, #e5e5e5 1px, transparent 1px), 
                linear-gradient(to bottom, #e5e5e5 1px, transparent 1px);
            background-size: 1px 1px; /* This makes the 1 million boxes */
            image-rendering: pixelated;
        }

        /* Hover Guide: Makes it easier to see which pixel you are on */
        #main-grid:hover::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            background-image: radial-gradient(circle, rgba(204,0,0,0.3) 1px, transparent 1px);
            background-size: 1px 1px;
        }

        .pixel-link { 
            position: absolute; 
            width: 1px; 
            height: 1px; 
            display: block;
            z-index: 5;
        }

        /* Modal / UI */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 9999; }
        .modal { background: white; padding: 30px; border-radius: 16px; width: 350px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid #eee; }
        
        h3 { margin-top: 0; font-size: 24px; color: #222; }
        label { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #666; letter-spacing: 0.5px; }
        input { width: 100%; margin: 10px 0 20px 0; padding: 14px; box-sizing: border-box; border: 2px solid #eee; border-radius: 8px; font-size: 14px; outline: none; }
        input:focus { border-color: #cc0000; }
        
        .color-row { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        #colorPreview { width: 50px; height: 50px; border-radius: 10px; border: 2px solid #ddd; background-color: #ff0000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        #error-msg { color: #cc0000; font-size: 13px; margin: -10px 0 15px 0; display: none; font-weight: bold; }
        
        .buy-btn { background: #008000; color: white; padding: 16px; width: 100%; border: none; cursor: pointer; font-weight: bold; border-radius: 8px; font-size: 18px; box-shadow: 0 4px 0 #005a00; }
        .buy-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #005a00; }
        .buy-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

        @media (max-width: 1380px) {
            .ad-column { display: none; }
            .grid-viewport { width: 98vw; }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>THE MILLION PIXELS</h1>
        <div id="stats" class="stats">Loading 1,000,000 Pixels...</div>
        
        <div class="toolbar">
            <span>🔍 ZOOM:</span>
            <input type="range" id="zoomSlider" min="1" max="40" value="1" step="1" oninput="updateZoom(this.value)">
            <span id="zoomLabel">1x</span>
        </div>
    </div>

    <div class="page-wrapper">
        <div class="ad-column">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-4335653991954613" data-ad-slot="YOUR_LEFT_SLOT" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <div class="grid-viewport" id="viewport">
            <div id="main-grid" onclick="handleGridClick(event)"></div>
        </div>

        <div class="ad-column">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-4335653991954613" data-ad-slot="YOUR_RIGHT_SLOT" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </div>

    <div class="overlay" id="purchaseOverlay">
        <div class="modal">
            <h3>Buy This Pixel</h3>
            <p id="coords-display" style="font-family: monospace; font-size: 18px; color: #cc0000; background: #fff1f1; padding: 5px; border-radius: 4px; text-align: center;">X:0, Y:0</p>
            
            <label>1. Pixel Color</label>
            <div class="color-row">
                <input type="color" id="pixelColor" value="#ff0000" oninput="updatePreview(this.value)" style="width: 80px; height: 50px; padding: 0; border: none; cursor: pointer; background: none;">
                <div id="colorPreview"></div>
            </div>

            <label>2. Your Link (HTTPS only)</label>
            <input type="text" id="linkUrl" placeholder="https://www.example.com" oninput="hideError()">
            <p id="error-msg">⚠️ Link must start with https://</p>
            
            <button id="buyBtn" class="buy-btn" onclick="submitPurchase()">Purchase for $1.00</button>
            <button onclick="closeModal()" style="background:none; color: #999; margin-top:15px; border:none; text-decoration:underline; cursor:pointer; font-size: 14px; width: 100%;">Cancel</button>
        </div>
    </div>

    <script>
        let currentX = 0, currentY = 0;
        let currentZoom = 1;
        const grid = document.getElementById('main-grid');

        function updateZoom(val) {
            currentZoom = val;
            grid.style.transform = `scale(${val})`;
            document.getElementById('zoomLabel').innerText = val + 'x';
        }

        function updatePreview(val) { 
            document.getElementById('colorPreview').style.backgroundColor = val; 
        }

        function hideError() { 
            document.getElementById('error-msg').style.display = 'none'; 
        }
        
        function handleGridClick(e) {
            const rect = grid.getBoundingClientRect();
            
            // MATH: Account for zoom to find the REAL pixel coordinate
            currentX = Math.floor((e.clientX - rect.left) / currentZoom);
            currentY = Math.floor((e.clientY - rect.top) / currentZoom);
            
            // Limit range to 0-999 (1 million total)
            currentX = Math.max(0, Math.min(999, currentX));
            currentY = Math.max(0, Math.min(999, currentY));

            document.getElementById('coords-display').innerText = `X: ${currentX}, Y: ${currentY}`;
            document.getElementById('purchaseOverlay').style.display = 'flex';
        }

        function closeModal() { 
            document.getElementById('purchaseOverlay').style.display = 'none'; 
            hideError(); 
        }

        async function submitPurchase() {
            const color = document.getElementById('pixelColor').value;
            const link = document.getElementById('linkUrl').value;
            
            if(!link.startsWith('https://')) { 
                document.getElementById('error-msg').style.display = 'block'; 
                return; 
            }
            
            const btn = document.getElementById('buyBtn');
            btn.innerText = "Redirecting...";
            btn.disabled = true;

            try {
                const res = await fetch('/create-checkout-session', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ x: currentX, y: currentY, color, link })
                });
                const session = await res.json();
                if(session.url) window.location.href = session.url;
            } catch (e) { 
                btn.innerText = "Error - Try Again"; 
                btn.disabled = false; 
            }
        }

        function renderPixel(p) {
            const pix = document.createElement('a');
            pix.href = p.link; 
            pix.target = "_blank"; 
            pix.className = 'pixel-link';
            pix.style.left = p.x + 'px'; 
            pix.style.top = p.y + 'px';
            pix.style.backgroundColor = p.color;
            pix.title = `Location: ${p.x},${p.y} | Link: ${p.link}`;
            grid.appendChild(pix);
        }

        async function loadPixels() {
            try {
                const res = await fetch('/api/pixels');
                const pixels = await res.json();
                if(Array.isArray(pixels)) {
                    pixels.forEach(renderPixel);
                    document.getElementById('stats').innerText = `Sold: ${pixels.length.toLocaleString()} / 1,000,000 Pixels`;
                }
            } catch (err) { 
                document.getElementById('stats').innerText = `Sold: 0 / 1,000,000 Pixels`; 
            }
        }
        loadPixels();
    </script>
</body>
</html>
