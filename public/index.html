<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Million Pixels</title>
    
    <link rel="icon" type="image/jpeg" href="favicon.jpg">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4335653991954613" 
     crossorigin="anonymous"></script> 

    <style>
        body { background-color: #fff; font-family: Verdana, Arial, Helvetica, sans-serif; margin: 0; padding: 0; }
        
        /* NEW: Master layout to handle outer left/right ad placement */
        .outer-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            margin: 0 auto;
            padding: 20px 10px;
            max-width: 100%;
        }

        /* NEW: Sidebar style optimized for vertical AdSense banners (e.g., 160x600 or 300x600) */
        .ad-sidebar {
            width: 160px; /* Change to 300px if you want wider ads */
            min-height: 600px;
            position: sticky;
            top: 20px; /* Keeps ads visible as user scrolls */
            background-color: #fafafa;
            border: 1px dashed #ccc; /* Helps visualize the ad space */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container { width: 1200px; text-align: center; flex-shrink: 0; }
        
        .header-main { padding: 20px 0; border-bottom: 1px solid #ccc; margin-bottom: 10px; }
        .header-main h1 { font-size: 32px; margin: 0; letter-spacing: -1px; }
        
        .top-nav { 
            background: #f4f4f4; border: 1px solid #000; padding: 10px; 
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; font-weight: bold; font-size: 13px;
        }

        .layout-wrapper { display: flex; gap: 15px; align-items: flex-start; }

        /* Left Sidebar */
        .sidebar { width: 180px; text-align: left; border: 1px solid #000; padding: 10px; background: #fffde0; flex-shrink: 0; }
        .sidebar h3 { font-size: 14px; margin-top: 0; border-bottom: 1px solid #000; padding-bottom: 5px; }
        .stat-box { margin-bottom: 15px; }
        .stat-label { font-size: 11px; color: #555; display: block; }
        .stat-value { font-size: 18px; color: #cc0000; font-weight: bold; }

        /* Grid Viewport */
        .grid-viewport { 
            width: 1000px; height: 1000px; overflow: auto; 
            border: 2px solid #000; background: #fff; position: relative;
        }

        #pixel-grid {
            width: 1000px; height: 1000px; position: relative; cursor: crosshair;
            background-image: linear-gradient(#e5e5e5 1px, transparent 1px), linear-gradient(90deg, #e5e5e5 1px, transparent 1px);
            background-size: 10px 10px;
            transform-origin: 0 0;
        }

        .pixel-entry { position: absolute; width: 1px; height: 1px; z-index: 5; }

        /* Purchase Modal */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; 
        }
        .buy-modal { 
            background: #fff; border: 3px solid #cc0000; width: 400px; 
            text-align: left; box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
        }
        .modal-header { background: #cc0000; color: #fff; padding: 10px; font-weight: bold; }
        .modal-body { padding: 20px; }
        
        .field-group { margin-bottom: 15px; }
        .field-group label { display: block; font-weight: bold; font-size: 12px; margin-bottom: 5px; }
        
        .coord-display-large { 
            font-family: monospace; background: #000; color: #00ff00; 
            padding: 10px; text-align: center; font-size: 16px; margin-bottom: 20px;
        }

        input[type="url"] { width: 94%; padding: 8px; border: 1px solid #999; }

        .checkout-btn { 
            background: #4CAF50; color: white; border: none; padding: 15px; 
            width: 100%; font-size: 18px; font-weight: bold; cursor: pointer;
            border-bottom: 4px solid #2E7D32;
        }
        .cancel-link { display: block; text-align: center; margin-top: 15px; color: #666; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

<div class="outer-wrapper">

    <div class="ad-sidebar">
        <ins class="adsbygoogle"
             style="display:inline-block;width:160px;height:600px;"
             data-ad-client="ca-pub-4335653991954613"
             data-ad-slot="1234567890"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <div class="container">
        <div class="header-main">
            <h1>The Million Pixels</h1>
            <span>1,000,000 pixels &bull; $1 per pixel</span>
        </div>

        <div class="top-nav">
            <div id="hover-tracker">X: 0, Y: 0 | Pixel #0</div>
            <div>
                Zoom: <input type="range" id="zoomBar" min="1" max="10" step="0.5" value="1">
                <span id="zoomVal">1x</span>
            </div>
        </div>

        <div class="layout-wrapper">
            <div class="sidebar">
                <h3>PIXEL STATS</h3>
                <div class="stat-box">
                    <span class="stat-label">Sold:</span>
                    <span id="stat-sold" class="stat-value">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Available:</span>
                    <span id="stat-stock" class="stat-value">1,000,000</span>
                </div>
                <hr>
                <p style="font-size: 10px;">Click an empty pixel to purchase.</p>
            </div>

            <div class="grid-viewport">
                <div id="pixel-grid" onmousemove="handleHover(event)" onclick="handleGridClick(event)"></div>
            </div>
        </div>
    </div>

    <div class="ad-sidebar">
        <ins class="adsbygoogle"
             style="display:inline-block;width:160px;height:600px;"
             data-ad-client="ca-pub-4335653991954613"
             data-ad-slot="0987654321"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

</div>

<div class="modal-overlay" id="overlay">
    <div class="buy-modal">
        <div class="modal-header">SECURE CHECKOUT</div>
        <div class="modal-body">
            <div id="coord-display" class="coord-display-large">X: 0 | Y: 0 | #0</div>
            
            <div class="field-group">
                <label>1. Pick Your Color</label>
                <input type="color" id="pColor" value="#ff0000" style="width: 100%; height: 40px; border: 1px solid #000;">
            </div>

            <div class="field-group">
                <label>2. Your Destination URL</label>
                <input type="url" id="pLink" placeholder="https://www.yourwebsite.com">
            </div>

            <button class="checkout-btn" onclick="processPurchase()">PURCHASE FOR $1.00</button>
            <span class="cancel-link" onclick="closeModal()">[ Cancel ]</span>
        </div>
    </div>
</div>

<script>
    let selX = 0, selY = 0;
    const grid = document.getElementById('pixel-grid');
    const zoomBar = document.getElementById('zoomBar');
    const hoverTracker = document.getElementById('hover-tracker');

    function updateStats(totalSold) {
        document.getElementById('stat-sold').innerText = totalSold.toLocaleString();
        document.getElementById('stat-stock').innerText = (1000000 - totalSold).toLocaleString();
    }

    zoomBar.oninput = function() {
        grid.style.transform = `scale(${this.value})`;
        document.getElementById('zoomVal').innerText = this.value + 'x';
    };

    function getCleanCoords(e) {
        const rect = grid.getBoundingClientRect();
        const scale = zoomBar.value;
        let x = Math.floor((e.clientX - rect.left) / scale);
        let y = Math.floor((e.clientY - rect.top) / scale);
        
        x = Math.max(0, Math.min(999, x));
        y = Math.max(0, Math.min(999, y));
        
        return { x, y, num: (y * 1000) + x + 1 };
    }

    function handleHover(e) {
        const pos = getCleanCoords(e);
        hoverTracker.innerText = `X: ${pos.x}, Y: ${pos.y} | Pixel #${pos.num.toLocaleString()}`;
    }

    function handleGridClick(e) {
        const pos = getCleanCoords(e);
        selX = pos.x;
        selY = pos.y;
        document.getElementById('coord-display').innerText = `X: ${selX} | Y: ${selY} | #${pos.num.toLocaleString()}`;
        document.getElementById('overlay').style.display = 'flex';
    }

    function closeModal() { document.getElementById('overlay').style.display = 'none'; }

    async function processPurchase() {
        const color = document.getElementById('pColor').value;
        const link = document.getElementById('pLink').value;

        if(!link.startsWith('http')) return alert("Please enter a valid URL.");

        try {
            const res = await fetch('/create-checkout-session', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ x: selX, y: selY, color, link })
            });

            if (res.ok) {
                const data = await res.json();
                if (data.url) {
                    window.location.href = data.url; 
                } else {
                    alert("Could not generate a checkout link.");
                }
            } else {
                const errData = await res.json();
                alert("Checkout Error: " + (errData.error || "Server issue"));
            }
        } catch (err) {
            console.error(err);
            alert("Failed to reach payment server.");
        }
    }

    function renderPixel(p) {
        const a = document.createElement('a');
        a.href = p.link; 
        a.target = "_blank"; 
        a.className = 'pixel-entry';
        a.style.left = p.x + 'px'; 
        a.style.top = p.y + 'px';
        a.style.backgroundColor = p.color;
        
        a.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        grid.appendChild(a);
    }

    async function loadPixels() {
        try {
            const res = await fetch('/api/pixels');
            const data = await res.json();
            grid.innerHTML = '';
            data.forEach(renderPixel);
            updateStats(data.length);
        } catch(e) {}
    }

    loadPixels();
</script>

</body>
</html>
