<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Million Pixels</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4335653991954613" crossorigin="anonymous"></script>

    <style>
        body { background-color: #ffffff; font-family: Arial, sans-serif; margin: 0; padding: 0; text-align: center; }
        
        /* Layout Header */
        .header-area { padding: 20px; border-bottom: 1px solid #ccc; background: #fdfdfd; }
        h1 { margin: 0; font-size: 26px; font-weight: bold; }
        .sold-stats { color: #cc0000; font-weight: bold; font-size: 18px; margin-top: 5px; }

        /* Performance Toolbar */
        .toolbar { background: #000; color: #fff; padding: 12px; display: flex; justify-content: center; align-items: center; gap: 20px; }
        input[type="range"] { cursor: pointer; width: 220px; accent-color: #cc0000; }

        .main-wrapper { display: flex; justify-content: center; padding: 20px; gap: 15px; align-items: flex-start; }
        .ad-slot { width: 160px; height: 600px; background: #f0f0f0; border: 1px solid #ddd; flex-shrink: 0; }

        /* THE 1,000,000 PIXEL VIEWPORT */
        .viewport {
            width: 1000px;
            height: 700px;
            overflow: auto;
            border: 3px solid #111;
            background: #fff;
            position: relative;
        }

        #grid-surface {
            width: 1000px;  /* 1000 horizontal pixels */
            height: 1000px; /* 1000 vertical pixels */
            position: relative;
            transform-origin: top left;
            cursor: crosshair;
            
            /* HIGH PERFORMANCE PIXEL GRID: Draws 1 million tiny squares */
            background-image: 
                linear-gradient(to right, rgba(0,0,0,0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 1px 1px;
            
            image-rendering: pixelated; 
            will-change: transform;
        }

        /* Sold Pixels (Placed individually) */
        .pixel-bought { position: absolute; width: 1px; height: 1px; z-index: 10; }

        /* Buy Popup */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 9999; }
        .modal { background: #fff; padding: 30px; width: 320px; border: 5px solid #000; text-align: left; }
        .coord-tag { background: #000; color: #fff; padding: 8px; font-weight: bold; margin-bottom: 20px; font-family: monospace; display: block; text-align: center; }
        
        .preview-flex { display: flex; align-items: center; gap: 15px; margin: 15px 0; }
        #colorView { width: 40px; height: 40px; border: 2px solid #000; border-radius: 50%; background: #ff0000; }
        
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #000; box-sizing: border-box; font-size: 14px; }
        .btn-confirm { background: #cc0000; color: #fff; border: 2px solid #000; width: 100%; padding: 15px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 20px; }
        .btn-cancel { display: block; text-align: center; margin-top: 10px; color: #777; cursor: pointer; text-decoration: underline; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header-area">
        <h1>The Million Pixels</h1>
        <div id="pixel-counter" class="sold-stats">SOLD: 0 / 1,000,000</div>
    </div>

    <div class="toolbar">
        <label>🔍 Zoom To Select A Pixel:</label>
        <input type="range" id="zoomCtrl" min="1" max="50" value="1" oninput="runZoom(this.value)">
        <span id="zoomDisplay" style="font-weight: bold; width: 40px;">1x</span>
    </div>

    <div class="main-wrapper">
        <div class="ad-slot">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-4335653991954613" data-ad-slot="YOUR_LEFT_SLOT" data-ad-format="auto"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <div class="viewport">
            <div id="grid-surface" onclick="startPurchase(event)"></div>
        </div>

        <div class="ad-slot">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-4335653991954613" data-ad-slot="YOUR_RIGHT_SLOT" data-ad-format="auto"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </div>

    <div class="overlay" id="purchaseBox">
        <div class="modal">
            <h2 style="margin:0 0 15px 0; font-size: 22px;">BUY PIXEL</h2>
            <div id="locTag" class="coord-tag">X: 0, Y: 0</div>
            
            <label style="font-weight:bold; font-size: 12px; color: #555;">1. SELECT COLOR</label>
            <div class="preview-flex">
                <input type="color" id="pickColor" value="#ff0000" oninput="updateCircle(this.value)" style="width:70px; height:45px; cursor:pointer;">
                <div id="colorView"></div>
            </div>

            <label style="font-weight:bold; font-size: 12px; color: #555;">2. YOUR WEBSITE (HTTPS)</label>
            <input type="text" id="pickUrl" placeholder="https://www.yourdomain.com">
            
            <button class="btn-confirm" id="buyBtn" onclick="checkout()">PURCHASE FOR $1.00</button>
            <span class="btn-cancel" onclick="closeBox()">Cancel</span>
        </div>
    </div>

    <script>
        let pX = 0, pY = 0, pZoom = 1;
        const surface = document.getElementById('grid-surface');

        function runZoom(v) {
            pZoom = v;
            surface.style.transform = `scale(${v})`;
            document.getElementById('zoomDisplay').innerText = v + 'x';
        }

        function updateCircle(c) {
            document.getElementById('colorView').style.backgroundColor = c;
        }

        function startPurchase(e) {
            const rect = surface.getBoundingClientRect();
            // Calculates the EXACT 0-999 coordinate
            pX = Math.floor((e.clientX - rect.left) / pZoom);
            pY = Math.floor((e.clientY - rect.top) / pZoom);

            // Clamp range
            pX = Math.max(0, Math.min(999, pX));
            pY = Math.max(0, Math.min(999, pY));

            document.getElementById('locTag').innerText = `X: ${pX}, Y: ${pY}`;
            document.getElementById('purchaseBox').style.display = 'flex';
        }

        function closeBox() {
            document.getElementById('purchaseBox').style.display = 'none';
        }

        async function checkout() {
            const color = document.getElementById('pickColor').value;
            const link = document.getElementById('pickUrl').value;
            
            if (!link.startsWith('https://')) {
                alert("Links must start with https://");
                return;
            }

            const b = document.getElementById('buyBtn');
            b.innerText = "SENDING TO STRIPE...";
            b.disabled = true;

            try {
                const res = await fetch('/create-checkout-session', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ x: pX, y: pY, color, link })
                });
                const d = await res.json();
                if (d.url) window.location.href = d.url;
            } catch (err) {
                b.innerText = "PURCHASE FOR $1.00";
                b.disabled = false;
            }
        }

        function placePixel(p) {
            const el = document.createElement('a');
            el.href = p.link;
            el.target = "_blank";
            el.className = 'pixel-bought';
            el.style.left = p.x + 'px';
            el.style.top = p.y + 'px';
            el.style.backgroundColor = p.color;
            el.title = `X:${p.x}, Y:${p.y}`;
            surface.appendChild(el);
        }

        async function loadGrid() {
            try {
                const res = await fetch('/api/pixels');
                const list = await res.json();
                if (Array.isArray(list)) {
                    list.forEach(placePixel);
                    document.getElementById('pixel-counter').innerText = `SOLD: ${list.length.toLocaleString()} / 1,000,000`;
                }
            } catch (e) {}
        }

        loadGrid();
    </script>
</body>
</html>
