<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Million Pixels</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4335653991954613" crossorigin="anonymous"></script>

    <style>
        /* Classic Styles */
        body { background-color: #fff; font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0; text-align: center; }
        .header { padding: 20px 0; border-bottom: 1px solid #ccc; background: #f9f9f9; }
        h1 { margin: 0; font-size: 28px; color: #000; }
        .stats { font-weight: bold; margin-top: 5px; color: #cc0000; }

        /* The Container */
        .container {
            display: flex;
            justify-content: center;
            margin: 20px auto;
            gap: 10px;
        }

        /* Ad Slots (Million Dollar Homepage Style Skyscrapers) */
        .ad-side { width: 160px; height: 600px; background: #eee; border: 1px solid #ddd; flex-shrink: 0; }

        /* THE GRID: Simple and Fast */
        #grid-wrapper {
            width: 1000px;
            height: 1000px;
            border: 2px solid #000;
            position: relative;
            background-color: #fff;
            /* Simple 10x10 grid lines just like the original site */
            background-image: linear-gradient(#e5e5e5 1px, transparent 1px), linear-gradient(90deg, #e5e5e5 1px, transparent 1px);
            background-size: 10px 10px;
            cursor: crosshair;
        }

        /* Individual Sold Pixels */
        .pixel-link {
            position: absolute;
            width: 1px;
            height: 1px;
            z-index: 5;
        }

        /* Modal Overlay */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: #fff; padding: 20px; border: 2px solid #000; width: 300px; text-align: left; }
        .modal h3 { margin-top: 0; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        input[type="text"], input[type="color"] { width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        
        .buy-btn { background: #ff0000; color: #fff; border: none; padding: 10px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
        .buy-btn:hover { background: #cc0000; }
        .cancel-btn { background: none; border: none; color: #666; text-decoration: underline; width: 100%; margin-top: 10px; cursor: pointer; }

        #error-text { color: red; font-size: 12px; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>The Million Pixels</h1>
        <div id="stats" class="stats">Sold: 0 / 1,000,000 pixels</div>
    </div>

    <div class="container">
        <div class="ad-side">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-4335653991954613" data-ad-slot="YOUR_LEFT_SLOT" data-ad-format="auto"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <div id="grid-wrapper" onclick="handleClick(event)"></div>

        <div class="ad-side">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-4335653991954613" data-ad-slot="YOUR_RIGHT_SLOT" data-ad-format="auto"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </div>

    <div class="overlay" id="modalOverlay">
        <div class="modal">
            <h3>Buy Pixel</h3>
            <p id="coord-info" style="font-weight: bold;"></p>
            
            <label>Color:</label>
            <input type="color" id="pixelColor" value="#ff0000">
            
            <label>Website URL:</label>
            <input type="text" id="pixelLink" placeholder="https://example.com">
            <p id="error-text">Please enter a valid https:// URL</p>
            
            <button class="buy-btn" onclick="submitOrder()">Purchase for $1.00</button>
            <button class="cancel-btn" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script>
        let selectedX = 0;
        let selectedY = 0;
        const grid = document.getElementById('grid-wrapper');

        function handleClick(e) {
            const rect = grid.getBoundingClientRect();
            selectedX = Math.floor(e.clientX - rect.left);
            selectedY = Math.floor(e.clientY - rect.top);

            // Clamp values
            if(selectedX < 0) selectedX = 0; if(selectedX > 999) selectedX = 999;
            if(selectedY < 0) selectedY = 0; if(selectedY > 999) selectedY = 999;

            document.getElementById('coord-info').innerText = `Coordinates: (${selectedX}, ${selectedY})`;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('error-text').style.display = 'none';
        }

        async function submitOrder() {
            const color = document.getElementById('pixelColor').value;
            const link = document.getElementById('pixelLink').value;
            const error = document.getElementById('error-text');

            if(!link.startsWith('https://')) {
                error.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/create-checkout-session', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ x: selectedX, y: selectedY, color, link })
                });
                const data = await res.json();
                if(data.url) window.location.href = data.url;
            } catch (err) {
                console.error("Payment Error", err);
            }
        }

        function addPixel(p) {
            const a = document.createElement('a');
            a.href = p.link;
            a.target = "_blank";
            a.className = 'pixel-link';
            a.style.left = p.x + 'px';
            a.style.top = p.y + 'px';
            a.style.backgroundColor = p.color;
            a.title = p.link;
            grid.appendChild(a);
        }

        async function loadPixels() {
            try {
                const res = await fetch('/api/pixels');
                const pixels = await res.json();
                if(Array.isArray(pixels)) {
                    pixels.forEach(addPixel);
                    document.getElementById('stats').innerText = `Sold: ${pixels.length.toLocaleString()} / 1,000,000 pixels`;
                }
            } catch (e) { console.log("Load failed"); }
        }

        loadPixels();
    </script>
</body>
</html>
