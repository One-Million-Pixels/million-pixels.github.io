<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Million Pixels</title>
    <style>
        body { background-color: #f0f0f0; font-family: "Courier New", Courier, monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #cc0000; font-size: 32px; margin-bottom: 5px; }
        .stats { margin-bottom: 20px; font-weight: bold; }
        
        #main-grid {
            width: 1000px;
            height: 1000px;
            background-color: white;
            border: 2px solid #999;
            position: relative;
            cursor: crosshair;
            /* Visual lines every 1px are too messy, so we show them every 10px */
            background-image: 
                linear-gradient(to right, #eee 1px, transparent 1px),
                linear-gradient(to bottom, #eee 1px, transparent 1px);
            background-size: 10px 10px;
        }

        .pixel {
            position: absolute;
            width: 1px;
            height: 1px;
        }

        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 100;
        }
        .modal { background: white; padding: 20px; border-radius: 5px; width: 300px; }
        input { width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        label { font-size: 12px; font-weight: bold; }
        button { background: #008000; color: white; padding: 10px; width: 100%; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>The Million Pixels</h1>
    <div id="stats" class="stats">Loading pixels...</div>

    <div id="main-grid" onclick="openPurchaseModal(event)"></div>

    <div class="overlay" id="purchaseOverlay">
        <div class="modal">
            <h3>Buy 1 Pixel ($1.00)</h3>
            <p id="coords-display">Coordinates: (0,0)</p>
            
            <label>Pick Pixel Color:</label>
            <input type="color" id="pixelColor" value="#ff0000">
            
            <label>Link Website:</label>
            <input type="text" id="linkUrl" placeholder="https://yourwebsite.com">
            
            <button id="buyBtn" onclick="submitPurchase()">Buy Pixel</button>
            <button onclick="closeModal()" style="background:#888; margin-top:5px;">Cancel</button>
        </div>
    </div>

    <script>
        let currentX = 0;
        let currentY = 0;

        function openPurchaseModal(e) {
            const rect = document.getElementById('main-grid').getBoundingClientRect();
            // Individual pixel selection (1x1)
            currentX = Math.floor(e.clientX - rect.left);
            currentY = Math.floor(e.clientY - rect.top);

            document.getElementById('coords-display').innerText = `Coordinates: (${currentX}, ${currentY})`;
            document.getElementById('purchaseOverlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('purchaseOverlay').style.display = 'none';
        }

        async function submitPurchase() {
            const color = document.getElementById('pixelColor').value;
            const link = document.getElementById('linkUrl').value;
            const btn = document.getElementById('buyBtn');

            if(!link.startsWith('http')) return alert("Please enter a valid URL starting with http:// or https://");

            btn.innerText = "Redirecting...";
            btn.disabled = true;

            // This calls your Render server
            const response = await fetch('/create-checkout-session', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ x: currentX, y: currentY, color, link })
            });

            const session = await response.json();
            if(session.url) {
                window.location.href = session.url; // Go to Stripe
            } else {
                alert("Error connecting to Stripe.");
                btn.innerText = "Buy Pixel";
                btn.disabled = false;
            }
        }

        function renderPixel(data) {
            const pix = document.createElement('a');
            pix.href = data.link;
            pix.target = "_blank";
            pix.className = 'pixel';
            pix.style.left = data.x + 'px';
            pix.style.top = data.y + 'px';
            pix.style.backgroundColor = data.color;
            pix.title = `Pixel (${data.x},${data.y}) - ${data.link}`;
            document.getElementById('main-grid').appendChild(pix);
        }

        window.onload = async () => {
            const res = await fetch('/api/pixels');
            const pixels = await res.json();
            pixels.forEach(renderPixel);
            document.getElementById('stats').innerText = `Sold: ${pixels.length}/1,000,000 pixels | $${pixels.length} Raised`;
        };
    </script>
</body>
</html>
