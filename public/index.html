<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Million Dollar Homepage</title>
    <style>
        body { background-color: #fff; font-family: Verdana, Arial, sans-serif; margin: 0; padding: 0; text-align: center; }
        .header { width: 1000px; margin: 0 auto; text-align: left; padding: 10px 0; }
        h1 { font-size: 24px; margin: 0; color: #000; }
        .stats-text { font-size: 14px; font-weight: bold; color: #cc0000; }
        .main-area { width: 1000px; margin: 0 auto; position: relative; }
        #pixel-grid {
            width: 1000px; height: 1000px; border: 2px solid #000;
            background-color: #fff; position: relative; cursor: crosshair;
            background-image: linear-gradient(#e5e5e5 1px, transparent 1px), linear-gradient(90deg, #e5e5e5 1px, transparent 1px);
            background-size: 10px 10px;
        }
        .pixel-entry { position: absolute; width: 1px; height: 1px; z-index: 5; }
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; 
        }
        .buy-modal { background: #fff; padding: 20px; border: 2px solid #000; width: 300px; text-align: left; }
        .coord-pill { background: #ffff00; font-weight: bold; padding: 5px; display: block; margin-bottom: 15px; border: 1px solid #000; font-size: 12px; }
        input[type="text"] { width: 92%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; }
        .confirm-btn { background: #ff0000; color: #fff; border: none; padding: 10px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>The Million Dollar Homepage</h1>
        <div id="pixel-stats" class="stats-text">Sold: 0 / 1,000,000 pixels</div>
    </div>

    <div class="main-area">
        <div id="pixel-grid" onclick="pixelClicked(event)"></div>
    </div>

    <div class="modal-overlay" id="overlay">
        <div class="buy-modal">
            <h3 style="margin-top:0">Buy This Pixel</h3>
            <div id="coord-display" class="coord-pill">X:0, Y:0 (Pixel #0)</div>
            
            <label>Pixel Color:</label>
            <input type="color" id="pColor" value="#ff0000" style="width: 100%; height: 40px; border: 1px solid #000; margin: 5px 0 15px 0;">
            
            <label>Your Link (HTTPS):</label>
            <input type="text" id="pLink" placeholder="https://example.com">
            
            <button class="confirm-btn" onclick="submitPurchase()">Purchase Pixel</button>
            <p onclick="closeModal()" style="text-align:center; text-decoration:underline; cursor:pointer; font-size: 12px; margin-top:10px;">Cancel</p>
        </div>
    </div>

    <script>
        let selX = 0, selY = 0;
        const grid = document.getElementById('pixel-grid');

        function pixelClicked(e) {
            const rect = grid.getBoundingClientRect();
            selX = Math.floor(e.clientX - rect.left);
            selY = Math.floor(e.clientY - rect.top);
            
            if(selX < 0) selX = 0; if(selX > 999) selX = 999;
            if(selY < 0) selY = 0; if(selY > 999) selY = 999;

            const pixelNum = (selY * 1000) + selX + 1;
            document.getElementById('coord-display').innerText = `Location: X=${selX}, Y=${selY} (Pixel #${pixelNum.toLocaleString()})`;
            document.getElementById('overlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('overlay').style.display = 'none'; }

        async function submitPurchase() {
            const color = document.getElementById('pColor').value;
            const link = document.getElementById('pLink').value;
            if(!link.startsWith('https://')) return alert("Use https://");

            const res = await fetch('/api/purchase', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ x: selX, y: selY, color, link })
            });
            if (res.ok) {
                renderPixel({x: selX, y: selY, color, link});
                closeModal();
            }
        }

        function renderPixel(p) {
            const a = document.createElement('a');
            a.href = p.link; a.target = "_blank"; a.className = 'pixel-entry';
            a.style.left = p.x + 'px'; a.style.top = p.y + 'px';
            a.style.backgroundColor = p.color; a.title = `Pixel at ${p.x},${p.y} - ${p.link}`;
            grid.appendChild(a);
        }

        async function loadPixels() {
            const res = await fetch('/api/pixels');
            const data = await res.json();
            data.forEach(renderPixel);
            document.getElementById('pixel-stats').innerText = `Sold: ${data.length.toLocaleString()} / 1,000,000 pixels`;
        }
        loadPixels();
    </script>
</body>
</html>
