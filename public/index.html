<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Million Dollar Homepage - Zoom Edition</title>
    <style>
        body { background-color: #f0f0f0; font-family: Verdana, Arial, sans-serif; margin: 0; padding: 0; text-align: center; }
        
        /* Floating Toolbar for Stats and Zoom */
        .toolbar { 
            position: sticky; top: 0; background: #fff; border-bottom: 2px solid #000; 
            padding: 10px; z-index: 100; display: flex; justify-content: center; gap: 20px; align-items: center;
        }

        .header { width: 1000px; margin: 0 auto; text-align: left; padding: 10px 0; }
        h1 { font-size: 20px; margin: 0; color: #000; display: inline-block; }

        /* Zoom Control Styling */
        .zoom-controls { background: #eee; padding: 5px 15px; border-radius: 5px; border: 1px solid #ccc; }
        
        /* Real-time Info Bar */
        #hover-info { font-weight: bold; color: #000; font-size: 14px; min-width: 300px; text-align: left; }

        .main-area { 
            width: 1000px; margin: 20px auto; position: relative; 
            overflow: auto; border: 5px solid #333; height: 80vh; background: #fff;
        }

        #pixel-grid {
            width: 1000px; height: 1000px; position: relative; cursor: crosshair;
            background-image: linear-gradient(#e5e5e5 1px, transparent 1px), linear-gradient(90deg, #e5e5e5 1px, transparent 1px);
            background-size: 10px 10px;
            transform-origin: 0 0; /* Critical for zooming from top-left */
            transition: transform 0.1s ease-out;
        }

        .pixel-entry { position: absolute; width: 1px; height: 1px; z-index: 5; }

        /* Modal Styling */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; 
        }
        .buy-modal { background: #fff; padding: 20px; border: 2px solid #000; width: 300px; text-align: left; }
        .coord-pill { background: #ffff00; font-weight: bold; padding: 5px; display: block; margin-bottom: 15px; border: 1px solid #000; font-size: 12px; }
        
        input[type="text"] { width: 92%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; }
        .confirm-btn { background: #ff0000; color: #fff; border: none; padding: 10px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div class="toolbar">
        <h1>The Million Dollar Homepage</h1>
        <div id="hover-info">Hover over the grid...</div>
        <div class="zoom-controls">
            <label>Zoom:</label>
            <input type="range" id="zoomBar" min="1" max="10" step="0.5" value="1">
            <span id="zoomVal">1x</span>
        </div>
    </div>

    <div class="main-area" id="scroll-container">
        <div id="pixel-grid" onmousemove="updateHoverInfo(event)" onclick="pixelClicked(event)"></div>
    </div>

    <div class="modal-overlay" id="overlay">
        <div class="buy-modal">
            <h3 style="margin-top:0">Buy This Pixel</h3>
            <div id="coord-display" class="coord-pill">X:0, Y:0 (Pixel #0)</div>
            <label>Color:</label>
            <input type="color" id="pColor" value="#ff0000" style="width: 100%; height: 30px;">
            <label>Link:</label>
            <input type="text" id="pLink" placeholder="https://example.com">
            <button class="confirm-btn" onclick="submitPurchase()">Purchase</button>
            <p onclick="closeModal()" style="text-align:center; text-decoration:underline; cursor:pointer; font-size: 12px;">Cancel</p>
        </div>
    </div>

    <script>
        let selX = 0, selY = 0;
        const grid = document.getElementById('pixel-grid');
        const zoomBar = document.getElementById('zoomBar');
        const zoomVal = document.getElementById('zoomVal');
        const hoverInfo = document.getElementById('hover-info');

        // --- ZOOM LOGIC ---
        zoomBar.oninput = function() {
            const scale = this.value;
            grid.style.transform = `scale(${scale})`;
            zoomVal.innerText = scale + 'x';
        };

        // --- HOVER LOGIC ---
        function updateHoverInfo(e) {
            const rect = grid.getBoundingClientRect();
            const scale = zoomBar.value;
            
            // We divide by scale because the visual mouse position 
            // changes when the grid is zoomed in
            const x = Math.floor((e.clientX - rect.left) / scale);
            const y = Math.floor((e.clientY - rect.top) / scale);

            if (x >= 0 && x < 1000 && y >= 0 && y < 1000) {
                const pixelNum = (y * 1000) + x + 1;
                hoverInfo.innerHTML = `X: <span>${x}</span>, Y: <span>${y}</span> | <span style="color:#cc0000">Pixel #${pixelNum.toLocaleString()}</span>`;
            }
        }

        // --- PURCHASE LOGIC ---
        function pixelClicked(e) {
            const rect = grid.getBoundingClientRect();
            const scale = zoomBar.value;
            selX = Math.floor((e.clientX - rect.left) / scale);
            selY = Math.floor((e.clientY - rect.top) / scale);
            
            const pixelNum = (selY * 1000) + selX + 1;
            document.getElementById('coord-display').innerText = `Location: X=${selX}, Y=${selY} (Pixel #${pixelNum.toLocaleString()})`;
            document.getElementById('overlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('overlay').style.display = 'none'; }

        async function submitPurchase() {
            const color = document.getElementById('pColor').value;
            const link = document.getElementById('pLink').value;
            if(!link.startsWith('https://')) return alert("Use https://");

            // Assuming local backend from previous step
            const res = await fetch('/api/purchase', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ x: selX, y: selY, color, link })
            });
            
            if (res.ok) {
                renderPixel({x: selX, y: selY, color, link});
                closeModal();
            }
        }

        function renderPixel(p) {
            const a = document.createElement('a');
            a.href = p.link; a.target = "_blank"; a.className = 'pixel-entry';
            a.style.left = p.x + 'px'; a.style.top = p.y + 'px';
            a.style.backgroundColor = p.color;
            grid.appendChild(a);
        }
    </script>
</body>
</html>
